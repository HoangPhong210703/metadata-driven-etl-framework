version: 2

models:
  - name: stg_crm_postgres_crm_project_task
    description: "Deduplicated project tasks from Odoo. Full refresh — latest version per ID."
    columns:
      - name: id
        description: "Task ID (natural key)"
        tests:
          - unique
          - not_null
      - name: name
        description: "Task name/title"
      - name: project_id
        description: "FK to project"
      - name: stage_id
        description: "Current workflow stage"
      - name: write_date
        description: "Last modified timestamp in source"

  - name: stg_customer_postgres_crm_res_partner
    description: "Deduplicated partners/customers from Odoo. Full refresh — latest version per ID."
    columns:
      - name: id
        description: "Partner ID (natural key)"
        tests:
          - unique
          - not_null
      - name: name
        description: "Partner or company name"
        tests:
          - not_null:
              arguments:
                severity: warn
      - name: email
        description: "Contact email address"
      - name: phone
        description: "Contact phone number"
      - name: is_company
        description: "True if partner is a company, false if individual"
      - name: write_date
        description: "Last modified timestamp in source"

  - name: stg_customer_postgres_crm_crm_lead
    description: "Deduplicated CRM leads from Odoo. Incremental — only new records per load."
    columns:
      - name: id
        description: "Lead ID (natural key)"
        tests:
          - unique
          - not_null
      - name: partner_id
        description: "FK to res_partner (customer)"
      - name: create_date
        description: "When the lead was created"
      - name: expected_revenue
        description: "Expected revenue from this lead"
      - name: prorated_revenue
        description: "Prorated revenue based on probability"
      - name: write_date
        description: "Last modified timestamp in source"

  - name: stg_hr_postgres_timesheet_account_account
    description: "Deduplicated chart of accounts from Odoo. Incremental — only new records per load."
    columns:
      - name: id
        description: "Account ID (natural key)"
        tests:
          - unique
          - not_null
      - name: name
        description: "Account name"
      - name: code
        description: "Account code"
      - name: write_date
        description: "Last modified timestamp in source"
