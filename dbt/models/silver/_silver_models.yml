version: 2

models:
  - name: silver__common__dim_date
    description: "Generated calendar dimension covering 2020-01-01 to 2030-12-31. No source dependency — built entirely from SQL generate_series."
    columns:
      - name: date_key
        description: "Surrogate key in YYYYMMDD integer format"
        tests:
          - unique
          - not_null
      - name: date
        description: "Calendar date"
        tests:
          - unique
          - not_null
      - name: year
        description: "Year (e.g. 2026)"
        tests:
          - not_null
      - name: month
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: quarter
        description: "Quarter (1-4)"
        tests:
          - not_null
      - name: day_of_week
        description: "ISO day of week (1=Monday, 7=Sunday)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 7]
      - name: is_weekend
        description: "True for Saturday and Sunday"
        tests:
          - not_null

  - name: silver__crm__fact_lead
    description: "Fact table joining CRM leads to silver__customer__dim_customer (current version) and silver__common__dim_date (by create_date). Incremental on lead_id."
    columns:
      - name: lead_id
        description: "Lead ID (natural key from crm_lead)"
        tests:
          - unique
          - not_null
      - name: date_key
        description: "FK to silver__common__dim_date — derived from lead create_date"
        tests:
          - relationships:
              arguments:
                to: ref('silver__common__dim_date')
                field: date_key
      - name: customer_key
        description: "FK to silver__customer__dim_customer.dbt_scd_id — current customer version at time of load"
      - name: expected_revenue
        description: "Expected revenue from the lead"
      - name: prorated_revenue
        description: "Revenue prorated by probability"
