version: 2

models:
  - name: silver__accounting__account_account
    description: "Deduplicated chart of accounts merged from multiple Odoo sources. Incremental — only new records per load."
    tests:
      - unique:
          column_name: "(id || '_' || _source)"
    columns:
      - name: id
        description: "Account ID (natural key within source)"
        tests:
          - not_null
      - name: _source
        description: "Source system identifier (e.g. postgres_crm, postgres_timesheet)"
        tests:
          - not_null
      - name: name
        description: "Account name"
      - name: code
        description: "Account code"
      - name: write_date
        description: "Last modified timestamp in source"

  - name: silver__common__dim_date
    description: "Generated calendar dimension covering 2020-01-01 to 2030-12-31. No source dependency — built entirely from SQL generate_series."
    columns:
      - name: date_key
        description: "Surrogate key in YYYYMMDD integer format"
        tests:
          - unique
          - not_null
      - name: date
        description: "Calendar date"
        tests:
          - unique
          - not_null
      - name: year
        description: "Year (e.g. 2026)"
        tests:
          - not_null
      - name: month
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: quarter
        description: "Quarter (1-4)"
        tests:
          - not_null
      - name: day_of_week
        description: "ISO day of week (1=Monday, 7=Sunday)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 7]
      - name: is_weekend
        description: "True for Saturday and Sunday"
        tests:
          - not_null

